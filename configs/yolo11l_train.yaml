# ============================================================================
# PPB Vision Module — YOLO11-L Training Hyperparameters
#
# Production backend comparison: standard NMS, mature ultralytics support.
# Architecture note: YOLO11 uses traditional NMS post-processing and
# full DFL (Distribution Focal Loss) — dfl is active here.
#
# Tuned for: single GPU with ≥8 GB VRAM (T4 / RTX 3080 / A10G)
# ============================================================================

# --- Core ---
epochs: 100
imgsz: 640
batch: 8          # L model is VRAM-heavy; reduce to 4 on 8 GB GPUs if OOM
patience: 20

# --- Optimizer ---
optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

# --- Warmup ---
warmup_epochs: 3.0
warmup_momentum: 0.8

# --- Loss weights ---
box: 7.5
cls: 0.5
dfl: 1.5          # active for YOLO11 (distribution focal loss)

# --- Built-in ultralytics augmentation ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
fliplr: 0.5
mosaic: 1.0
mixup: 0.15

# --- Misc ---
pretrained: true
exist_ok: false
